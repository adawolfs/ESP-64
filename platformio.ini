; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
src_dir = main
default_envs = esp32-c3-devkitm-1

[env:esp32-c3-devkitm-1]
platform = espressif32
board = esp32-c3-devkitm-1
framework = espidf
board_build.cmake_extra_args =
	-DIDF_COMPONENT_MANAGER=OFF
board_build.filesystem = spiffs
board_build.partitions = partitions.csv
monitor_speed = 115200
upload_speed = 460800
build_flags =
	-O3
	-DCORE_DEBUG_LEVEL=0
	; Override the default Joy-Bus pin with:
	; -DN64_JOYBUS_DATA_GPIO=<gpio>

; Legacy alias: same as the default RMT Joy-Bus transport.
[env:esp32-c3-spike]
extends = env:esp32-c3-devkitm-1

; Fallback transport for diagnosis only. The default build uses RMT RX with
; immediate open-drain GPIO responses, which is the hardware-verified GB Tower path.
[env:esp32-c3-bitbang]
extends = env:esp32-c3-devkitm-1
build_flags =
	${env:esp32-c3-devkitm-1.build_flags}
	-DN64_JOYBUS_BITBANG
